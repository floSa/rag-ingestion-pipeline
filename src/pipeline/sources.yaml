# Declaration des sources d'ingestion.
#
# Ajouter une source = ajouter un bloc ici, aucun code Python a modifier.
# Champs :
#   name : identifiant unique (minuscules, chiffres, underscores)
#   glob : motif de recherche relatif au dossier Datas/
#   type : pdf | html
#   cleaning (optionnel, html uniquement) :
#     extra_remove_selectors : selecteurs CSS a supprimer en plus des heuristiques
#     min_text_chars / min_text_ratio : seuils d'acceptation du nettoyage
#     max_data_uri_bytes : taille au-dela de laquelle les images inline data:
#       sont exportees vers MinIO (ou supprimees si export_images: false)
#     export_images : true par defaut
#     profiles : profils d'extraction dedies a un site, prioritaires sur le
#       mode generique (article/main, trafilatura, readability)
#
# Exemple — capture SingleFile d'un site :
#   - name: capture_monsite
#     glob: "captures/monsite/**/*.html"
#     type: html
#     cleaning:
#       extra_remove_selectors: [".cookie-banner", "#sidebar"]
#       profiles:
#         - name: monsite_article          # s'applique si detect matche
#           detect: ".article-reader"
#           content: ".article-reader main" # ce qu'on garde
#           strip: [".newsletter-banner"]   # supprime DANS le contenu garde

sources:
  - name: pdfs
    glob: "pdfs/**/*.pdf"
    type: pdf

  - name: livres_html
    glob: "htms/**/*.html"
    type: html
